<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Runway blocks an out-of-lane Codex patch and catches remaining Git drift</title>
  <desc id="desc">A native Codex PreToolUse hook denies an undeclared patch before editing. A separate Runway-executed test passes, but the fresh Git audit catches another undeclared file and refuses handoff until corrected.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071112"/><stop offset="1" stop-color="#102524"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#142827"/><stop offset="1" stop-color="#0a1718"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .eyebrow{font:700 17px ui-monospace,Consolas,monospace;letter-spacing:3px;fill:#d7ff5c}
      .title{font:800 54px Inter,Arial,sans-serif;letter-spacing:-2px;fill:#f2f8f6}
      .sub{font:400 22px Inter,Arial,sans-serif;fill:#9db4af}
      .head{font:750 27px Inter,Arial,sans-serif;fill:#ecf5f2}
      .label{font:700 15px ui-monospace,Consolas,monospace;letter-spacing:2px;fill:#819a95}
      .mono{font:600 18px ui-monospace,Consolas,monospace;fill:#d9e7e3}
      .small{font:500 16px Inter,Arial,sans-serif;fill:#8fa5a0}
      .pass{fill:#6ff0d1}.deny{fill:#ff9287}.lime{fill:#d7ff5c}.amber{fill:#f2cf68}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="50" r="260" fill="#d7ff5c" opacity=".025"/>
  <text x="82" y="70" class="eyebrow">RUNWAY / TWO-SIDED PROOF</text>
  <text x="82" y="137" class="title">One patch blocked. One drift caught.</text>
  <text x="82" y="181" class="sub">Before edit: native Codex hook. After execution: fresh Git audit. Both use the same declared lane.</text>

  <rect x="82" y="230" width="690" height="420" rx="26" fill="url(#panel)" stroke="#52706a" stroke-width="2"/>
  <circle cx="123" cy="274" r="8" fill="#ff9287" filter="url(#glow)"/>
  <text x="147" y="282" class="head">1 / PRE-EDIT PATCH GUARD</text>
  <text x="118" y="327" class="label">BOUND CODEX SESSION</text>
  <rect x="118" y="348" width="618" height="55" rx="12" fill="#091617" stroke="#314c47"/>
  <text x="140" y="382" class="mono"><tspan class="small">RUNWAY_LANE=</tspan><tspan class="lime">tax-adjustment</tspan><tspan dx="28" class="pass">AIRBORNE</tspan></text>
  <text x="118" y="447" class="label">REQUESTED TOOL CALL</text>
  <rect x="118" y="468" width="618" height="55" rx="12" fill="#091617" stroke="#314c47"/>
  <text x="140" y="502" class="mono">apply_patch  <tspan class="deny">src/quote.js</tspan></text>
  <rect x="118" y="540" width="618" height="82" rx="14" fill="#321f1c" stroke="#ff9287" stroke-opacity=".55"/>
  <text x="140" y="574" class="eyebrow deny">DENIED BEFORE EDIT</text>
  <text x="140" y="604" class="mono">src/quote.js is outside lane tax-adjustment</text>

  <rect x="828" y="230" width="690" height="420" rx="26" fill="url(#panel)" stroke="#52706a" stroke-width="2"/>
  <circle cx="869" cy="274" r="8" fill="#f2cf68"/>
  <text x="893" y="282" class="head">2 / POST-COMMAND GIT BACKSTOP</text>
  <text x="864" y="327" class="label">RUNWAY-EXECUTED EVIDENCE</text>
  <rect x="864" y="348" width="618" height="55" rx="12" fill="#091617" stroke="#314c47"/>
  <text x="886" y="382" class="mono">node --test tests/tax.test.mjs  <tspan class="pass">PASS</tspan></text>
  <text x="864" y="447" class="label">FRESH GIT AUDIT</text>
  <rect x="864" y="468" width="618" height="82" rx="12" fill="#091617" stroke="#314c47"/>
  <text x="886" y="502" class="mono">changedFiles: [ adjustments.js, <tspan class="deny">quote.js</tspan> ]</text>
  <text x="886" y="532" class="mono">unexpectedFiles: [ <tspan class="deny">src/quote.js</tspan> ]</text>
  <rect x="864" y="567" width="618" height="55" rx="14" fill="#332b19" stroke="#f2cf68" stroke-opacity=".55"/>
  <text x="886" y="601" class="eyebrow amber">HANDOFF REFUSED / RECEIPT NULL</text>

  <path d="M389 650 V697 H800" fill="none" stroke="#6ff0d1" stroke-width="3"/>
  <path d="M1173 650 V697 H800" fill="none" stroke="#6ff0d1" stroke-width="3"/>
  <circle cx="800" cy="697" r="8" fill="#6ff0d1" filter="url(#glow)"/>
  <rect x="280" y="705" width="1040" height="105" rx="22" fill="#163129" stroke="#6ff0d1" stroke-opacity=".55"/>
  <text x="320" y="744" class="eyebrow pass">CORRECT ONLY THE DRIFT, THEN VERIFY AGAIN</text>
  <text x="320" y="781" class="mono"><tspan class="pass">HANDOFF RECEIPT</tspan><tspan dx="35">exit 0</tspan><tspan dx="35">diff conformant</tspan><tspan dx="35">source: runway-executed</tspan></text>

  <text x="82" y="858" class="small">39 passing tests • hook scope: supported Codex patch tools • Git audit scope: observed changed files • no universal enforcement claim</text>
</svg>
